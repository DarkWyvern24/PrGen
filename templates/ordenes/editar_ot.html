{% extends 'base.html' %}

{% block title %}Editar Orden{% endblock %}

{% block content %}

<h2 class="mb-4">Editar Orden de Trabajo</h2>

<a href="{% url 'ordenes:lista_ot' %}" class="btn btn-secondary mb-3">
    ← Volver a Órdenes
</a>

<div class="card shadow p-4">
    <form method="post">
        {% csrf_token %}

        <div class="row">
            {% for field in form %}
            <div class="col-md-6 mb-3">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <button type="submit" class="btn btn-warning mt-3">
            Actualizar Orden
        </button>
    </form>
</div>

{% endblock %}
