{% extends 'base.html' %}

{% block title %}Dashboard Usuario{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow p-4">
            <h2 class="mb-3">Bienvenido {{ request.user.username }}</h2>
            <h5 class="text-muted mb-4">Rol: Usuario</h5>

            <a href="{% url 'ordenes:lista_ot' %}" class="btn btn-outline-dark w-100 mb-3">
                Ver Órdenes de Trabajo
            </a>

            <a href="{% url 'usuarios:cambiar_password' %}" class="btn btn-outline-secondary w-100 mb-3">
                Cambiar Contraseña
            </a>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100">
                    Cerrar Sesión
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
